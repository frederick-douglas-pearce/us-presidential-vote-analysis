name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancel superseded runs on the same ref (e.g. new pushes to an open PR).
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      # Pin the interpreter to .python-version so CI matches local dev.
      - name: Set up Python
        run: uv python install

      # --locked fails the build on a stale uv.lock instead of re-resolving.
      - name: Install dependencies
        id: install
        run: uv sync --locked --dev

      - name: Lint (ruff)
        run: uv run ruff check

      # Run the type/test checks even if a sibling check failed, so a lint
      # failure doesn't mask a type or test failure. Gate on the install step
      # succeeding, so a dependency-install failure short-circuits cleanly
      # instead of spawning confusing secondary failures here.
      - name: Type check (mypy)
        if: ${{ !cancelled() && steps.install.outcome == 'success' }}
        run: uv run mypy

      - name: Tests (pytest, integration excluded)
        if: ${{ !cancelled() && steps.install.outcome == 'success' }}
        run: uv run pytest -m "not integration" --cov=usvote
