<!--
  SYNTHETIC UCSB fixture — structure mimics 1820 (layout L0, summary-only); ALL VALUES
  ARE FABRICATED. No UCSB-sourced bytes (D022).

  Pins for the #35 parser — the pre-1824 era, where NO POPULAR VOTE EXISTS:
    - there is NO state table at all. The page carries only the summary block: party,
      nominees, and electoral vote. There is no STATE/STATES row anywhere, and no
      TOTAL VOTE or Votes/%/EV columns.
    - `select_results_table` (which selects the table containing an own-row with a cell
      reading STATE/STATES) must therefore return None here. Verified against the real
      snapshot: that rule selects exactly one table on every popular-vote year and ZERO
      on all nine 1789-1820 pages, so it doubles as the L0 detector.
    - max table width is 6, well under the 8 that the narrowest popular-vote year
      (g=2 -> W=8) can produce. There is no width at which this could be mistaken for a
      data table.
    - `parse_election_year(html, 1820)` returns None (1820 is in NO_POPULAR_VOTE_YEARS).
      The SAME html labelled with a year >= 1824 must RAISE, not return None: a missing
      state table in a year that should have one means UCSB restructured something, and
      guessing is exactly the silent failure D024 sec 4 rules out.

  There are no aggregation identities to pin -- that is the whole point of this fixture.
-->
